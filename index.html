<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reflection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">Loading...</div>

    <div id="auth-container" style="display: none;">
        <h2>Login</h2>
        <div id="login-buttons">
            <button id="google-login">Login with Google</button>
        </div>
        <form id="email-password-login">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p><a href="#" id="reset-password">Forgot password?</a></p>
        <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
    </div>

    <div id="signup-container" style="display: none;">
        <h2>Sign Up</h2>
        <div id="signup-buttons">
            <button id="google-signup">Sign up with Google</button>
        </div>
        <form id="email-password-signup">
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
    </div>

    <div id="app-container" style="display: none;">
        <header>
            <h1>Daily Reflection</h1>
            <nav>
                <a href="index.html" class="nav-btn active">📝 New</a>
                <a href="reflections.html" class="nav-btn">📜 Past</a>
            </nav>
            <div id="user-info">
                <p id="user-email"></p>
                <button id="change-password">Change Password</button>
                <button id="logout">Logout</button>
            </div>
        </header>

        <main>
            <section id="reflection-form">
                <h2>Today's Reflection</h2>
                <form id="daily-reflection">
                    <label for="didWell">What did I do well today?</label>
                    <textarea id="didWell" rows="4" required></textarea>

                    <label for="didPoorly">What did I do poorly today?</label>
                    <textarea id="didPoorly" rows="4" required></textarea>

                    <label for="improveTomorrow">What will I improve tomorrow?</label>
                    <textarea id="improveTomorrow" rows="4" required></textarea>

                    <button type="submit">Save Reflection</button>
                </form>
            </section>
        </main>
    </div>

    <div id="feedback-modal">
        <div class="modal-content">
            <button id="close-modal" class="close-modal">&times;</button>
            <h3>AI Feedback</h3>
            <p id="feedback-text"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
