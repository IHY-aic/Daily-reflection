<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Reflections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">Loading...</div>

    <div id="auth-container" style="display: none;">
        <h2>Login</h2>
        <div id="login-buttons">
            <button id="google-login">Login with Google</button>
        </div>
        <form id="email-password-login">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
    </div>

    <div id="signup-container" style="display: none;">
        <h2>Sign Up</h2>
        <div id="signup-buttons">
            <button id="google-signup">Sign up with Google</button>
        </div>
        <form id="email-password-signup">
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
    </div>

    <div id="app-container" style="display: none;">
        <header>
            <h1>Daily Reflection</h1>
            <nav>
                <a href="index.html" class="nav-btn">📝 New</a>
                <a href="reflections.html" class="nav-btn active">📜 Past</a>
            </nav>
            <div id="user-info">
                <p id="user-email"></p>
                <button id="logout">Logout</button>
            </div>
        </header>

        <main>
            <section id="past-reflections">
                <h2>Past Reflections</h2>
                <div id="reflections-controls">
                    <div id="calendar-container">
                        <div id="month-nav">
                            <button id="prev-month" aria-label="Previous Month">&#9664;</button>
                            <span id="month-label"></span>
                            <button id="next-month" aria-label="Next Month">&#9654;</button>
                        </div>
                        <div id="calendar-grid"></div>
                    </div>
                    <button id="show-all" type="button">Show All</button>
                    <button id="download-reflections" type="button">Download</button>
                    <select id="download-format">
                        <option value="json">JSON</option>
                        <option value="markdown">Markdown</option>
                        <option value="html">HTML</option>
                        <option value="csv">CSV</option>
                        <option value="txt">TXT</option>
                        <option value="png">PNG</option>
                    </select>
                </div>
                <div id="reflections-list"></div>
                <div id="pagination"></div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <!-- GEMINI_API_KEY is injected at deploy time -->
    <script>window.GEMINI_API_KEY = "{{ GEMINI_API_KEY }}";</script>
    <script type="module" src="script.js"></script>
</body>
</html>
